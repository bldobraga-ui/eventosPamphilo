<!DOCTYPE html><html lang="pt-BR" class="dark"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Luan Barber | Sistema Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
--bg-body:#070709;--bg-main:#0c0c10;--bg-card:#141418;--bg-card-hover:#1a1a20;
--bg-input:#18181e;--border:#222228;--border-light:#2e2e36;
--red:#dc2626;--red-dark:#b91c1c;--red-glow:rgba(220,38,38,.25);
--gold:#c9a96e;--gold-dark:#a8873f;
--white:#ffffff;--t1:#f0f0f2;--t2:#b0b0ba;--t3:#76767e;--t4:#4a4a52;
--font-display:'Bebas Neue',sans-serif;--font-body:'Outfit',sans-serif;
--radius:12px;--radius-sm:8px;--radius-lg:18px;
--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-red:0 4px 20px var(--red-glow);
--transition:.25s cubic-bezier(.4,0,.2,1);
--nav-h:64px;--bottom-h:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg-body);color:var(--t1);
line-height:1.6;overflow-x:hidden;min-height:100vh;min-height:100dvh;
-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-main)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
input,select,textarea,button{font-family:inherit;font-size:16px;border:none;outline:none;background:none}
button{cursor:pointer}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:.04em;font-weight:400;line-height:1.1}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);
background:rgba(7,7,9,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;
justify-content:space-between;padding:0 20px}
.topnav .brand{display:flex;align-items:center;gap:10px}
.topnav .brand-icon{width:36px;height:36px;background:var(--red);border-radius:8px;
display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.topnav .brand-text{font-family:var(--font-display);font-size:26px;letter-spacing:.06em;color:var(--white)}
.topnav .brand-text span{color:var(--red)}
.topnav-links{display:flex;gap:6px}
.topnav-links button{padding:8px 14px;border-radius:var(--radius-sm);
color:var(--t2);font-size:13px;font-weight:500;transition:var(--transition)}
.topnav-links button:hover,.topnav-links button.active{color:var(--white);background:var(--bg-card)}
@media(max-width:768px){.topnav-links{display:none}}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);
background:rgba(7,7,9,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-top:1px solid var(--border);z-index:100;display:none;
padding:0 8px;padding-bottom:env(safe-area-inset-bottom)}
@media(max-width:768px){.bottomnav{display:flex;align-items:center;justify-content:space-around}}
.bottomnav button{display:flex;flex-direction:column;align-items:center;gap:3px;
padding:6px 12px;border-radius:var(--radius-sm);color:var(--t3);
font-size:10px;font-weight:500;transition:var(--transition);background:none}
.bottomnav button i{font-size:20px;transition:var(--transition)}
.bottomnav button.active{color:var(--red)}
.bottomnav button.active i{transform:scale(1.15)}
.bottomnav .book-btn{background:var(--red);color:#fff;border-radius:50%;
width:52px;height:52px;font-size:22px;margin-top:-18px;box-shadow:var(--shadow-red);
display:flex;align-items:center;justify-content:center;flex-direction:row;gap:0;padding:0}
.bottomnav .book-btn span{display:none}

/* MAIN */
.main{padding-top:var(--nav-h);padding-bottom:16px;min-height:100vh;min-height:100dvh}
@media(max-width:768px){.main{padding-bottom:calc(var(--bottom-h) + 16px)}}
.page{animation:fadeUp .4s ease both;max-width:720px;margin:0 auto;padding:20px 16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:14px 28px;border-radius:var(--radius);font-weight:600;font-size:15px;
transition:var(--transition);cursor:pointer;white-space:nowrap}
.btn-red{background:var(--red);color:#fff;box-shadow:var(--shadow-red)}
.btn-red:hover{background:#ef4444;transform:translateY(-1px)}
.btn-red:active{transform:scale(.97)}
.btn-outline{border:1px solid var(--border-light);color:var(--t1);background:transparent}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-ghost{color:var(--t2);padding:10px 16px}
.btn-ghost:hover{color:var(--white);background:var(--bg-card)}
.btn-block{width:100%}
.btn-sm{padding:10px 18px;font-size:13px;border-radius:var(--radius-sm)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;font-weight:700}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:disabled{opacity:.5;pointer-events:none}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
padding:20px;transition:var(--transition)}
.card:hover{border-color:var(--border-light)}
.card-glow{position:relative;overflow:hidden}
.card-glow::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(circle,var(--red-glow) 0%,transparent 60%);opacity:0;
transition:opacity .4s;pointer-events:none}
.card-glow:hover::before{opacity:1}

/* INPUTS */
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:600;color:var(--t2);
margin-bottom:6px;letter-spacing:.03em}
.input-group input,.input-group select{width:100%;padding:14px 16px;
background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);
color:var(--t1);font-size:16px;transition:var(--transition)}
.input-group input:focus,.input-group select:focus{border-color:var(--red);
box-shadow:0 0 0 3px var(--red-glow)}
.input-group input::placeholder{color:var(--t4)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em}
.badge-red{background:rgba(220,38,38,.15);color:#f87171}
.badge-green{background:rgba(34,197,94,.15);color:#4ade80}
.badge-gold{background:rgba(201,169,110,.15);color:var(--gold)}
.badge-gray{background:rgba(120,120,130,.15);color:var(--t2)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0}

/* TOAST */
.toast-container{position:fixed;top:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--radius);background:var(--bg-card);
border:1px solid var(--border);box-shadow:var(--shadow);color:var(--t1);font-size:14px;
animation:slideInRight .3s ease;display:flex;align-items:center;gap:10px;max-width:340px}
.toast i{font-size:18px}
.toast.success i{color:#4ade80}.toast.error i{color:#f87171}.toast.info i{color:#60a5fa}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;
animation:fadeIn .2s ease}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
padding:28px 24px;max-width:400px;width:100%;animation:scaleIn .25s ease;max-height:80vh;overflow-y:auto}
.modal-box h3{font-size:28px;margin-bottom:12px}
.modal-box p{color:var(--t2);font-size:14px;margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* WHATSAPP FLOAT */
.wa-float{position:fixed;bottom:90px;right:16px;width:56px;height:56px;
background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:26px;color:#fff;z-index:90;box-shadow:0 4px 16px rgba(37,211,102,.4);
transition:var(--transition);cursor:pointer}
.wa-float:hover{transform:scale(1.1)}
@media(min-width:769px){.wa-float{bottom:24px}}

/* ================ HOME ================ */
.hero{position:relative;margin:-20px -16px 0;padding:80px 24px 60px;
background:linear-gradient(135deg,#0c0c10 0%,#1a0a0a 50%,#0c0c10 100%);overflow:hidden;text-align:center}
.hero::before{content:'';position:absolute;inset:0;
background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(220,38,38,.03) 40px,rgba(220,38,38,.03) 41px),
repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(220,38,38,.03) 40px,rgba(220,38,38,.03) 41px);pointer-events:none}
.hero::after{content:'';position:absolute;top:-120px;right:-120px;width:360px;height:360px;
background:radial-gradient(circle,rgba(220,38,38,.12),transparent 70%);pointer-events:none}
.hero-logo{width:90px;height:90px;background:var(--red);border-radius:20px;
display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
font-size:40px;color:#fff;box-shadow:var(--shadow-red);position:relative}
.hero h1{font-size:clamp(48px,10vw,72px);letter-spacing:.08em;margin-bottom:4px}
.hero h1 span{color:var(--red)}
.hero-sub{color:var(--t2);font-size:15px;margin-bottom:16px;font-weight:300}
.hero-rating{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
.hero-rating .stars{color:var(--gold);font-size:14px;display:flex;gap:2px}
.hero-rating .score{font-weight:700;font-size:18px;color:var(--gold)}
.hero-rating .count{color:var(--t3);font-size:13px}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

.section-title{font-size:32px;margin-bottom:4px;letter-spacing:.06em}
.section-sub{color:var(--t3);font-size:14px;margin-bottom:24px}

.home-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-bottom:32px}
.home-cat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
padding:18px 8px;text-align:center;cursor:pointer;transition:var(--transition)}
.home-cat:hover{border-color:var(--red);transform:translateY(-2px)}
.home-cat i{font-size:24px;color:var(--red);margin-bottom:8px;display:block}
.home-cat span{font-size:12px;font-weight:600;color:var(--t2);display:block}

.home-about{margin:32px 0}
.home-about p{color:var(--t2);font-size:14px;line-height:1.8}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0}
.info-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.info-card i{color:var(--red);font-size:18px;margin-bottom:8px}
.info-card h4{font-size:16px;color:var(--t1);margin-bottom:4px;font-family:var(--font-body);font-weight:600}
.info-card p{font-size:12px;color:var(--t3);line-height:1.5}

.hours-table{width:100%;border-collapse:collapse;margin-top:12px}
.hours-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.hours-table td:first-child{color:var(--t2);font-weight:500}
.hours-table td:last-child{color:var(--t1);text-align:right;font-weight:600}
.hours-table tr:last-child td{border-bottom:none}
.hours-table .closed{color:var(--red)}

.social-links{display:flex;gap:12px;margin-top:16px}
.social-links a{width:44px;height:44px;border-radius:50%;background:var(--bg-card);
border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
font-size:18px;color:var(--t2);transition:var(--transition)}
.social-links a:hover{color:var(--white);border-color:var(--red);background:rgba(220,38,38,.1)}

/* ================ AUTH ================ */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--nav-h) - 40px);
min-height:calc(100dvh - var(--nav-h) - 40px);padding:24px 16px}
.auth-box{width:100%;max-width:400px}
.auth-box .auth-header{text-align:center;margin-bottom:32px}
.auth-box .auth-header h2{font-size:40px;letter-spacing:.06em}
.auth-box .auth-header p{color:var(--t3);font-size:14px;margin-top:6px}
.auth-social{display:flex;gap:10px;margin-bottom:20px}
.auth-social button{flex:1;padding:12px;border-radius:var(--radius);border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;gap:8px;color:var(--t1);
font-size:14px;font-weight:500;transition:var(--transition);background:var(--bg-card)}
.auth-social button:hover{border-color:var(--border-light);background:var(--bg-card-hover)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--t4);font-size:13px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{text-align:center;margin-top:16px;font-size:14px;color:var(--t3)}
.auth-link a{color:var(--red);font-weight:600;cursor:pointer}
.auth-link a:hover{text-decoration:underline}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin:16px 0}
.checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--red);margin-top:2px;flex-shrink:0}
.checkbox-row label{font-size:13px;color:var(--t3);cursor:pointer}
.captcha-placeholder{background:var(--bg-input);border:1px solid var(--border);
border-radius:var(--radius);padding:14px;margin-bottom:16px;text-align:center;
color:var(--t4);font-size:13px}

/* ================ DASHBOARD ================ */
.dash-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.dash-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-dark));
display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex-shrink:0}
.dash-info h2{font-size:22px;font-family:var(--font-body);font-weight:700;line-height:1.3}
.dash-info p{color:var(--t3);font-size:13px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.dash-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
padding:14px 12px;text-align:center}
.dash-stat .val{font-size:20px;font-weight:700;color:var(--white)}
.dash-stat .lbl{font-size:11px;color:var(--t3);margin-top:2px}
.dash-stat .val.gold{color:var(--gold)}

.dash-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-card);
border-radius:var(--radius);padding:4px;border:1px solid var(--border)}
.dash-tabs button{flex:1;padding:10px 12px;border-radius:var(--radius-sm);
font-size:13px;font-weight:600;color:var(--t3);transition:var(--transition)}
.dash-tabs button.active{background:var(--red);color:#fff}

.appt-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.appt-card .appt-left{flex:1}
.appt-card .appt-service{font-weight:600;font-size:15px;margin-bottom:2px}
.appt-card .appt-detail{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px}
.appt-card .appt-detail i{font-size:11px;color:var(--t4)}
.appt-card .appt-right{text-align:right}
.appt-card .appt-date{font-weight:700;font-size:14px;color:var(--red)}
.appt-card .appt-time{font-size:12px;color:var(--t2)}

.empty-state{text-align:center;padding:40px 16px;color:var(--t3)}
.empty-state i{font-size:40px;color:var(--t4);margin-bottom:12px}
.empty-state p{font-size:14px}

/* ================ BOOKING ================ */
.booking-progress{display:flex;align-items:center;gap:0;margin-bottom:28px;padding:0 4px}
.booking-step{display:flex;align-items:center;flex:1}
.booking-step .step-circle{width:32px;height:32px;border-radius:50%;background:var(--bg-input);
border:2px solid var(--border);display:flex;align-items:center;justify-content:center;
font-size:13px;font-weight:700;color:var(--t4);transition:var(--transition);flex-shrink:0}
.booking-step .step-circle.active{background:var(--red);border-color:var(--red);color:#fff}
.booking-step .step-circle.done{background:var(--red);border-color:var(--red);color:#fff}
.booking-step .step-line{flex:1;height:2px;background:var(--border);margin:0 6px;transition:var(--transition)}
.booking-step .step-line.active{background:var(--red)}
.booking-step:last-child .step-line{display:none}

.search-box{position:relative;margin-bottom:20px}
.search-box input{width:100%;padding:14px 16px 14px 44px;background:var(--bg-input);
border:1px solid var(--border);border-radius:var(--radius);color:var(--t1);font-size:16px}
.search-box input:focus{border-color:var(--red)}
.search-box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--t4)}

.svc-category{margin-bottom:16px}
.svc-cat-header{display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);
border-radius:var(--radius);cursor:pointer;transition:var(--transition);user-select:none}
.svc-cat-header:hover{border-color:var(--border-light)}
.svc-cat-header .cat-left{display:flex;align-items:center;gap:10px}
.svc-cat-header .cat-left i{color:var(--red);font-size:16px;width:24px;text-align:center}
.svc-cat-header .cat-left span{font-weight:600;font-size:14px}
.svc-cat-header .cat-count{font-size:12px;color:var(--t3)}
.svc-cat-header .chevron{color:var(--t4);transition:var(--transition);font-size:14px}
.svc-cat-header.open .chevron{transform:rotate(180deg)}

.svc-items{overflow:hidden;max-height:0;transition:max-height .35s ease}
.svc-items.open{max-height:1000px}
.svc-item{display:flex;align-items:center;gap:12px;padding:14px 16px;
border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.svc-item:hover{background:var(--bg-card-hover)}
.svc-item:last-child{border-bottom:none}
.svc-item .svc-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-light);
display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;font-size:12px;color:transparent}
.svc-item.selected .svc-check{background:var(--red);border-color:var(--red);color:#fff}
.svc-item .svc-info{flex:1}
.svc-item .svc-name{font-weight:600;font-size:14px}
.svc-item .svc-meta{font-size:12px;color:var(--t3);margin-top:2px}
.svc-item .svc-price{font-weight:700;font-size:15px;color:var(--white);white-space:nowrap}
.svc-item .svc-price.free{color:var(--t3);font-weight:500;font-size:13px}

.pro-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg-card);
border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;
margin-bottom:10px;transition:var(--transition)}
.pro-card.selected{border-color:var(--red);background:rgba(220,38,38,.05)}
.pro-card .pro-avatar{width:48px;height:48px;border-radius:50%;
background:linear-gradient(135deg,var(--border-light),var(--t4));
display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--white)}

function fmt(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fmtDur(m){if(m>=60){const h=Math.floor(m/60);const r=m%60;return r?`${h}h${r}min`:`${h}h`;}return `${m}min`;}
function fmtDate(d){const p=d.split('-');return `${p[2]}/${p[1]}/${p[0]}`;}
function dayName(d){return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(d+'T12:00:00').getDay()];}
function fullDayName(i){return ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][i];}
function monthName(m){return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m];}
function getAllServices(){return SERVICES.flatMap(c=>c.items);}
function getServiceById(id){return getAllServices().find(s=>s.id===id);}

function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const icons={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='.3s';
    setTimeout(()=>t.remove(),300);},3000);
}

function showModal(title,body,actions){
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box"><h3>${title}</h3><p>${body}</p>
    <div class="modal-actions">${actions}</div></div></div>`;

function toggleBookingService(id){
  const idx=state.booking.services.indexOf(id);
  if(idx>-1)state.booking.services.splice(idx,1);else state.booking.services.push(id);
  render();
}
function selectProfessional(id){state.booking.professional=id;render();}
function selectDate(d){state.booking.date=d;state.booking.time=null;render();}
function selectTime(t){state.booking.time=t;render();}
function bookingNext(){
  const s=state.booking.step;
  if(s===0&&state.booking.services.length===0){showToast('Selecione ao menos um serviço','error');return;}
  if(s===1&&!state.booking.professional){showToast('Selecione um profissional','error');return;}
  if(s===2&&!state.booking.date){showToast('Selecione uma data','error');return;}
  if(s===3&&!state.booking.time){showToast('Selecione um horário','error');return;}
  if(s===4){confirmBooking();return;}
  state.booking.step=s+1;render();window.scrollTo({top:0,behavior:'smooth'});
}
function bookingBack(){if(state.booking.step>0){state.booking.step--;render();window.scrollTo({top:0,behavior:'smooth'});}}

function confirmBooking(){
  const b=state.booking;
  const svcs=b.services.map(id=>getServiceById(id));
  const pro=PROFESSIONALS.find(p=>p.id===b.professional);
  const total=svcs.reduce((s,v)=>s+v.price,0);
  const dur=svcs.reduce((s,v)=>s+v.duration,0);
  state.appointments.unshift({
    id:state.nextApptId++,client:state.user?state.user.name:'Cliente',services:svcs.map(s=>s.name),professional:pro.name,
    date:b.date,time:b.time,status:'upcoming',total,duration:dur
  });
  state.bookingConfirmed=true;render();
}

function getAvailableTimes(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay();
  const sch=SCHEDULE[dow];
  if(!sch||!sch.open)return[];
  const totalDur=state.booking.services.reduce((s,id)=>{const sv=getServiceById(id);return s+(sv?sv.duration:0);},0)||30;
  const [sh,sm]=sch.start.split(':').map(Number);
  const [eh,em]=sch.end.split(':').map(Number);
  const startMin=sh*60+sm;const endMin=eh*60+em;
  const times=[];
  const booked=state.appointments.filter(a=>a.date===dateStr&&a.status==='upcoming').map(a=>a.time);
  for(let m=startMin;m+totalDur<=endMin;m+=30){
    const hh=String(Math.floor(m/60)).padStart(2,'0');
    const mm=String(m%60).padStart(2,'0');
    const t=`${hh}:${mm}`;
    times.push({time:t,available:!booked.includes(t)});
  }
  return times;
}

function renderBookingDate(){
  const y=state.calYear,m=state.calMonth;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const days=['D','S','T','Q','Q','S','S'];
  let cells=days.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateObj=new Date(y,m,d);dateObj.setHours(0,0,0,0);
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=dateObj.getDay();
    const isPast=dateObj<today;
    const isToday=dateObj.getTime()===today.getTime();
    const isClosed=!SCHEDULE[dow]||!SCHEDULE[dow].open;
    const isSelected=state.booking.date===dateStr;
    let cls='cal-day';
    if(isPast||isClosed)cls+=' off';
    else cls+=' available';
    if(isToday)cls+=' today';
    if(isSelected)cls+=' selected';
    cells+=`<div class="${cls}" ${!isPast&&!isClosed?`onclick="selectDate('${dateStr}')"`:''}>${d}</div>`;
  }
  return `<div class="cal-header">
    <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
    <h3>${monthName(m)} ${y}</h3>
    <button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="cal-grid">${cells}</div>
  ${state.booking.date?`<p style="text-align:center;color:var(--t2);font-size:14px"><i class="fas fa-calendar-check" style="color:var(--red)"></i> ${dayName(state.booking.date)}, ${fmtDate(state.booking.date)}</p>`:'<p style="text-align:center;color:var(--t4);font-size:14px">Selecione uma data disponível</p>'}`;
}

function changeMonth(dir){
  state.calMonth+=dir;
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  render();
}

      <td style="font-weight:600">${p.name}${p.subtitle?` — ${p.subtitle}`:''}</td>
      <td>${fmt(p.price)}/mês</td><td>${p.validity}</td>
      <td><button class="toggle-btn ${p.active?'toggle-on':'toggle-off'}" onclick="togglePlan(${p.id})">${p.active?'Ativo':'Inativo'}</button></td>
      <td><button class="action-btn edit-btn" onclick="showToast('Edição em breve','info')">Editar</button><button class="action-btn del-btn" onclick="showDeletePlanModal(${p.id},'${p.name.replace(/'/g,"\\'")}')">Excluir</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function togglePlan(id){
  const p=PLANS.find(p=>p.id===id);if(p)p.active=!p.active;render();showToast('Status alterado');
}
function showDeletePlanModal(id,name){
  showModal('Excluir Plano',`Tem certeza que deseja excluir o plano <strong>${name}</strong>?`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-red btn-sm" onclick="deletePlan(${id})">Excluir</button>`);
}
function deletePlan(id){PLANS.splice(PLANS.findIndex(p=>p.id===id),1);closeModal();render();showToast('Plano removido');}

function renderAdminClients(){
  return `<div class="table-responsive"><table class="admin-table">
    <thead><tr><th>ID</th><th>Nome</th><th>E-mail</th><th>Telefone</th></tr></thead>
    <tbody>${state.users.map(u=>`<tr>
      <td>${u.id}</td><td style="font-weight:600">${u.name}</td><td>${u.email}</td><td>${u.phone||'-'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function getTodayStr(){
  const t=new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function getAgendaAvailableCount(dateStr,proFilter){
  const dow=new Date(dateStr+'T12:00:00').getDay();
  const sch=SCHEDULE[dow];
  if(!sch||!sch.open)return 0;
  const [sh,sm]=sch.start.split(':').map(Number);
  const [eh,em]=sch.end.split(':').map(Number);
  const totalSlots=Math.floor(((eh*60+em)-(sh*60+sm))/30);
  let booked=state.appointments.filter(a=>a.date===dateStr&&a.status==='upcoming');
  if(proFilter&&proFilter!=='all')booked=booked.filter(a=>a.professional===proFilter);
  return Math.max(0,totalSlots-booked.length);
}

function selectAgendaDate(dateStr){state.agendaDate=dateStr;render();}

function renderAgendaApptCard(appt,startTime){
  const endM=startTime.split(':').map(Number);
  const totalMin=endM[0]*60+endM[1]+appt.duration;
  const endTimeStr=`${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
  const initials=(appt.client||'Cliente').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  return `<div class="agenda-appt">
    <div class="appt-top">
      <div class="appt-avatar">${initials}</div>
      <div class="appt-client">${appt.client||'Cliente'}</div>
    </div>
    <div class="appt-svc">${appt.services.join(', ')}</div>
    <div class="appt-bottom">
      <span><i class="fas fa-clock"></i> ${startTime} — ${endTimeStr}</span>
      <span><i class="fas fa-hourglass-half"></i> ${fmtDur(appt.duration)}</span>
      <span><i class="fas fa-user"></i> ${appt.professional}</span>
    </div>
  </div>`;
}

function renderAdminAppointments(){
  if(!state.agendaDate)state.agendaDate=getTodayStr();
  const selectedDate=state.agendaDate;
  const selectedPro=state.agendaPro||'all';
  const todayStr=getTodayStr();

  // Generate 14 days centered around today (-3 to +10)
  const days=[];
  const base=new Date();base.setDate(base.getDate()-3);
  for(let i=0;i<14;i++){
    const d=new Date(base);d.setDate(d.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dow=d.getDay();
    const isClosed=!SCHEDULE[dow]||!SCHEDULE[dow].open;
    const apptCount=state.appointments.filter(a=>a.date===ds&&a.status==='upcoming').length;
    days.push({ds,day:d.getDate(),dow,abbr:['DOM','SEG','TER','QUA','QUI','SEX','SÁB'][dow],
      isToday:ds===todayStr,isClosed,apptCount});
  }

  // Filter appointments for selected date
  let dayAppts=state.appointments.filter(a=>a.date===selectedDate&&a.status==='upcoming');
  if(selectedPro!=='all')dayAppts=dayAppts.filter(a=>a.professional===selectedPro);
  dayAppts.sort((a,b)=>a.time.localeCompare(b.time));

  const selectedDow=new Date(selectedDate+'T12:00:00').getDay();
  const sch=SCHEDULE[selectedDow];
  const totalAppts=dayAppts.length;
  const totalRevenue=dayAppts.reduce((s,a)=>s+a.total,0);
  const availCount=getAgendaAvailableCount(selectedDate,selectedPro);

  // Build timeline
  let timelineHtml='';
  if(sch&&sch.open){
    const [sh,sm]=sch.start.split(':').map(Number);
    const [eh,em]=sch.end.split(':').map(Number);
    const startMin=sh*60+sm;const endMin=eh*60+em;
    const bookedMap={};
    dayAppts.forEach(a=>{bookedMap[a.time]=a;});

    for(let m=startMin;m<endMin;m+=30){
      const hh=String(Math.floor(m/60)).padStart(2,'0');
      const mm=String(m%60).padStart(2,'0');
      const ts=`${hh}:${mm}`;
      const appt=bookedMap[ts];
      const hasAppt=!!appt;
      timelineHtml+=`<div class="agenda-slot ${hasAppt?'has-appt':''}">
        <div class="slot-time">${ts}</div>
        <div class="slot-rail"><div class="rail-dot"></div></div>
        <div class="slot-content">${hasAppt?renderAgendaApptCard(appt,ts)
          :`<div class="agenda-available"><i class="fas fa-circle"></i> Disponível</div>`}</div>
      </div>`;
    }
  }else{
    timelineHtml=`<div class="agenda-closed-msg"><i class="fas fa-moon"></i><p>Fechado neste dia</p></div>`;
  }

  return `
  <div class="agenda-pro-filter">
    <button class="agenda-pro-pill ${selectedPro==='all'?'active':''}" onclick="state.agendaPro='all';render()">
      <i class="fas fa-users" style="margin-right:4px;font-size:11px"></i> Todos</button>
    ${PROFESSIONALS.map(p=>`<button class="agenda-pro-pill ${selectedPro===p.name?'active':''}" onclick="state.agendaPro='${p.name}';render()">
      <i class="fas ${p.avatar}" style="margin-right:4px;font-size:11px"></i> ${p.name}</button>`).join('')}
  </div>

  <div class="agenda-day-scroll" id="agendaDayScroll">
    ${days.map(d=>{
      let cls='agenda-day';
      if(d.isClosed)cls+=' off';
      else if(d.ds===selectedDate)cls+=' selected';
      else if(d.isToday)cls+=' today';
      const dotCount=Math.min(d.apptCount,4);
      const dotColor=d.ds===selectedDate?'rgba(255,255,255,.6)':d.isToday?'var(--gold)':'var(--red)';
      const dots=dotCount>0?Array(dotCount).fill(0).map(()=>`<div class="dot" style="background:${dotColor}"></div>`).join(''):'';
      return `<div class="${cls}" onclick="${!d.isClosed?`selectAgendaDate('${d.ds}')`:''}">
        <div class="day-abbr">${d.abbr}</div>
        <div class="day-num">${d.day}</div>
        <div class="day-dots">${dots}</div>
      </div>`;
    }).join('')}
  </div>

  <div class="agenda-stats">
    <div class="agenda-stat-card"><div class="stat-val" style="color:var(--red)">${totalAppts}</div><div class="stat-lbl">Agendamentos</div></div>
    <div class="agenda-stat-card"><div class="stat-val revenue">${fmt(totalRevenue)}</div><div class="stat-lbl">Faturamento</div></div>
    <div class="agenda-stat-card"><div class="stat-val" style="color:#4ade80">${availCount}</div><div class="stat-lbl">Disponíveis</div></div>
  </div>

  <div class="agenda-date-label"><i class="fas fa-calendar-day"></i> ${fullDayName(selectedDow)}, ${fmtDate(selectedDate)}</div>

  <div class="agenda-timeline">${timelineHtml}</div>`;
}

function renderAdminConfig(){
  return `<div class="admin-config">
    <h3 style="font-size:20px;font-family:var(--font-body);font-weight:700;margin-bottom:16px">Horário de Funcionamento</h3>
    ${Object.entries(SCHEDULE).map(([k,v])=>`<div class="day-row">
      <label>${v.label}</label>
      <input type="checkbox" ${v.open?'checked':''} onchange="SCHEDULE[${k}].open=this.checked;render()">
      <input type="time" value="${v.start||'09:00'}" ${!v.open?'disabled':''} onchange="SCHEDULE[${k}].start=this.value" style="flex:1">
      <span style="color:var(--t4);font-size:13px">até</span>
      <input type="time" value="${v.end||'18:00'}" ${!v.open?'disabled':''} onchange="SCHEDULE[${k}].end=this.value" style="flex:1">
    </div>`).join('')}
    <button class="btn btn-red btn-sm mt-20" onclick="render();showToast('Configurações salvas!')"><i class="fas fa-save"></i> Salvar</button>
  </div>`;
}

/* ============================================================
   EVENTS
   ============================================================ */
function attachEvents(){
  const scroll=document.getElementById('agendaDayScroll');
  if(scroll){
    const sel=scroll.querySelector('.agenda-day.selected')||scroll.querySelector('.agenda-day.today');
    if(sel){sel.scrollIntoView({behavior:'auto',block:'nearest',inline:'center'});}
  }
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.documentElement.classList.add('dark');
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',event=>{
    if(event.matches){document.documentElement.classList.add('dark');}
    else{document.documentElement.classList.remove('dark');}
  });
  render();
}
document.addEventListener('DOMContentLoaded',init);
</script>
